<!DOCTYPE html>
<html>
<head>
    <title>CodeMaster Academy - Mode 1 + Mode 2</title>

    <!-- Mode 2 CSS Added -->
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            text-align: center;
        }

        h1 {
            background-color: #4CAF50;
            color: white;
            padding: 15px;
            margin: 0;
        }

        h2 {
            margin-top: 20px;
        }

        div {
            background: white;
            padding: 15px;
            margin: 15px auto;
            width: 250px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        div:hover {
            transform: scale(1.05);
        }

        progress {
            width: 100%;
            height: 15px;
        }

        ul {
            list-style-type: none;
            padding: 0;
        }

        li {
            background: white;
            margin: 10px auto;
            padding: 10px;
            width: 300px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        iframe {
            margin-top: 20px;
            border-radius: 10px;
        }
    </style>

</head>

<body>

    <h1>CodeMaster Academy Dashboard</h1>

    <!-- Courses Section -->
    <h2>My Courses</h2>

    <div>
        <h3>HTML Course</h3>
        <progress value="70" max="100"></progress>
        <p>70% Completed</p>
    </div>

    <div>
        <h3>JavaScript Course</h3>
        <progress value="50" max="100"></progress>
        <p>50% Completed</p>
    </div>

    <div>
        <h3>Python Course</h3>
        <progress value="30" max="100"></progress>
        <p>30% Completed</p>
    </div>

    <!-- Deadlines -->
    <h2>Upcoming Deadlines</h2>
    <ul>
        <li>HTML Project - 20 April</li>
        <li>JavaScript Quiz - 22 April</li>
        <li>Python Assignment - 25 April</li>
    </ul>

    <!-- Video Section -->
    <h2>Video Lecture</h2>
    <iframe width="560" height="315" 
    src="https://www.youtube.com/embed/HcOc7P5BMi4" 
    title="YouTube video player" 
    frameborder="0" 
    allowfullscreen>
    </iframe>

</body>
</html>
